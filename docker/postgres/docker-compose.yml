services:
  postgres:
    image: postgres:16
    container_name: queueflow-postgres
    environment:
      POSTGRES_DB:       queueflow
      POSTGRES_USER:     queueflow
      POSTGRES_PASSWORD: queueflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QueueFlow — 候補排隊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500&family=Cormorant+SC:wght@600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #080706;
  --surface:     #0F0E0C;
  --surface-2:   #191712;
  --border:      #272320;
  --amber:       #F59E0B;
  --amber-dim:   rgba(245,158,11,.3);
  --amber-glow:  rgba(245,158,11,.08);
  --gold:        #C9963A;
  --text:        #EEE8DC;
  --muted:       #6B6358;
  --green:       #10B981;
  --red:         #EF4444;
}

html, body { height: 100%; background: var(--bg); color: var(--text);
             font-family: 'IBM Plex Mono', monospace; overflow-x: hidden; }

/* noise + scanlines */
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 900;
  background: repeating-linear-gradient(to bottom, transparent 0, transparent 3px,
    rgba(0,0,0,.04) 3px, rgba(0,0,0,.04) 4px);
}
body::after {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 899;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.06'/%3E%3C/svg%3E");
  opacity: .5;
}

/* ambient glow */
.glow-bg {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse 60% 50% at 50% 48%,
    rgba(245,158,11,.07) 0%, transparent 70%);
  opacity: 0; transition: opacity 1.2s ease;
}
.glow-bg.active { opacity: 1; }

/* ─── Header ─────────────────────────────────────────────────────── */
header {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px; border-bottom: 1px solid var(--border);
  gap: 16px;
}
.logo { font-family: 'Cormorant SC', serif; font-size: 1rem;
        font-weight: 600; letter-spacing: .35em; color: var(--amber);
        white-space: nowrap; flex-shrink: 0; }
.logo em { color: var(--muted); font-style: normal; font-weight: 400; }

/* 連線列 — 正中央 */
.connect-bar {
  display: flex; align-items: center; gap: 8px;
  flex: 1; max-width: 560px; margin: 0 auto;
}
.connect-bar input {
  background: var(--surface-2); border: 1px solid var(--border);
  color: var(--text); font-family: 'IBM Plex Mono', monospace;
  font-size: .72rem; padding: 7px 10px; outline: none;
  transition: border-color .2s; min-width: 0;
}
.connect-bar input:focus { border-color: var(--amber-dim); }
.in-event { width: 72px; flex-shrink: 0; }
.in-user  { flex: 1; }
.btn-connect {
  padding: 7px 16px; background: transparent;
  border: 1px solid var(--amber-dim); color: var(--amber);
  font-family: 'IBM Plex Mono', monospace; font-size: .65rem;
  letter-spacing: .15em; text-transform: uppercase; cursor: pointer;
  transition: background .2s; white-space: nowrap; flex-shrink: 0;
}
.btn-connect:hover { background: var(--amber-glow); }

.header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.ws-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
.ws-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
.ws-label { font-size: .6rem; letter-spacing: .08em; color: var(--muted); }
.ws-label.live { color: var(--green); }

/* ─── Stage ─────────────────────────────────────────────────────── */
.stage {
  position: relative; z-index: 1;
  height: calc(100vh - 53px);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 20px;
}

.event-meta { text-align: center; margin-bottom: 36px; }
.event-meta .label { font-size: .55rem; letter-spacing: .3em; color: var(--muted);
                     text-transform: uppercase; margin-bottom: 4px; }
.event-meta .name { font-family: 'Cormorant SC', serif; font-size: 1.4rem;
                    font-weight: 600; letter-spacing: .08em; color: var(--text); }

/* Ticket frame */
.ticket {
  position: relative; display: flex; flex-direction: column;
  align-items: center; padding: 36px 64px 28px;
  background: var(--surface); border: 1px solid var(--border);
  min-width: 300px; margin-bottom: 24px;
}
.ticket::before, .ticket::after { content: ''; position: absolute; width: 16px; height: 16px; }
.ticket::before { top: -1px; left: -1px;
  border-top: 2px solid var(--amber-dim); border-left: 2px solid var(--amber-dim); }
.ticket::after  { bottom: -1px; right: -1px;
  border-bottom: 2px solid var(--amber-dim); border-right: 2px solid var(--amber-dim); }
.ticket .corner-br { position: absolute; top: -1px; right: -1px; width: 16px; height: 16px;
  border-top: 2px solid var(--amber-dim); border-right: 2px solid var(--amber-dim); }
.ticket .corner-bl { position: absolute; bottom: -1px; left: -1px; width: 16px; height: 16px;
  border-bottom: 2px solid var(--amber-dim); border-left: 2px solid var(--amber-dim); }

.ticket-label { font-size: .52rem; letter-spacing: .45em; color: var(--gold);
                text-transform: uppercase; margin-bottom: 2px; }
.queue-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(96px, 20vw, 180px);
  line-height: .82; letter-spacing: -.01em;
  color: var(--amber);
  text-shadow: 0 0 30px rgba(245,158,11,.55), 0 0 80px rgba(245,158,11,.2);
  transition: opacity .12s ease, transform .12s ease;
  user-select: none;
}
.queue-num.idle { color: var(--border); text-shadow: none; font-size: clamp(68px,14vw,128px); }
.queue-num.flip { opacity: 0; transform: translateY(-8px) scaleY(.92); }

.ahead { margin-top: 8px; font-size: .65rem; letter-spacing: .15em; color: var(--muted); visibility: hidden; }
.ahead strong { color: var(--gold); font-weight: 500; }

/* Status badge */
.badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 14px; border: 1px solid; font-size: .58rem;
  letter-spacing: .25em; text-transform: uppercase; margin-top: 16px;
}
.badge .dot { width: 5px; height: 5px; border-radius: 50%; }
.badge.idle     { border-color: var(--border); color: var(--muted); }
.badge.idle     .dot { background: var(--muted); }
.badge.waiting  { border-color: var(--amber-dim); color: var(--amber); }
.badge.waiting  .dot { background: var(--amber); animation: blink 1.4s ease-in-out infinite; }
.badge.admitted { border-color: rgba(16,185,129,.4); color: var(--green); }
.badge.admitted .dot { background: var(--green); }
.badge.expired,
.badge.cancelled { border-color: rgba(239,68,68,.3); color: var(--red); }
.badge.expired .dot, .badge.cancelled .dot { background: var(--red); }

@keyframes blink {
  0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(245,158,11,.5); }
  50%      { opacity:.6; box-shadow: 0 0 0 5px rgba(245,158,11,0); }
}

/* Action button */
.btn {
  margin-top: 28px; padding: 14px 52px;
  font-family: 'IBM Plex Mono', monospace; font-size: .78rem;
  font-weight: 500; letter-spacing: .2em; text-transform: uppercase;
  border: none; cursor: pointer;
  transition: background .2s, box-shadow .2s, transform .1s;
}
.btn.join { background: var(--amber); color: var(--bg); }
.btn.join:hover { background: #FBBA2A; box-shadow: 0 0 22px rgba(245,158,11,.4); }
.btn.cancel { background: transparent; border: 1px solid rgba(239,68,68,.4); color: var(--red); }
.btn.cancel:hover { background: rgba(239,68,68,.06); }
.btn:active { transform: scale(.98); }
.btn:disabled { background: var(--surface-2); color: var(--muted); cursor: not-allowed;
                border: 1px solid var(--border); box-shadow: none; }

/* ─── Toast ─────────────────────────────────────────────────────── */
.toasts { position: fixed; top: 64px; right: 20px; z-index: 1000;
          display: flex; flex-direction: column; gap: 6px; }
.toast {
  padding: 10px 18px; background: var(--surface-2);
  border-left: 3px solid var(--amber); font-size: .68rem;
  letter-spacing: .04em; max-width: 280px;
  animation: toastIn .25s ease, toastOut .3s ease 2.7s forwards;
}
.toast.err { border-left-color: var(--red); }
.toast.ok  { border-left-color: var(--green); }
@keyframes toastIn  { from { opacity:0; transform: translateX(12px); } }
@keyframes toastOut { to   { opacity:0; transform: translateX(8px); } }

/* ─── Admitted overlay ───────────────────────────────────────────── */
.overlay {
  display: none; position: fixed; inset: 0; z-index: 800;
  background: rgba(8,7,6,.92); flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
}
.overlay.show { display: flex; animation: fadeIn .6s ease; }
@keyframes fadeIn { from { opacity: 0; } }
.overlay-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(52px,12vw,108px);
  color: var(--green); letter-spacing: .05em;
  text-shadow: 0 0 40px rgba(16,185,129,.5);
}
.overlay-sub { font-size: .72rem; letter-spacing: .2em; color: var(--muted); text-transform: uppercase; }
.btn-dismiss {
  margin-top: 16px; padding: 9px 28px; background: transparent;
  border: 1px solid var(--border); color: var(--muted);
  font-family: 'IBM Plex Mono', monospace; font-size: .68rem;
  letter-spacing: .15em; cursor: pointer; transition: border-color .2s, color .2s;
}
.btn-dismiss:hover { border-color: var(--muted); color: var(--text); }

@media (max-width: 600px) {
  header { flex-wrap: wrap; padding: 12px 14px; gap: 10px; }
  .connect-bar { order: 3; width: 100%; max-width: none; }
  .logo { order: 1; }
  .header-right { order: 2; }
  .ticket { padding: 28px 32px; min-width: 260px; }
}
</style>
</head>
<body>
<div class="glow-bg" id="glowBg"></div>

<header>
  <div class="logo">Queue<em>Flow</em></div>

  <!-- 主要操作：連線列集中在 header 正中央 -->
  <div class="connect-bar">
    <input class="in-event" type="number" id="evInput" placeholder="活動ID" min="1" title="活動 ID">
    <input class="in-user"  type="text"   id="uidInput" placeholder="使用者 ID（留空自動產生）">
    <button class="btn-connect" onclick="connect()">連線</button>
  </div>

  <div class="header-right">
    <div class="ws-dot" id="wsDot"></div>
    <span class="ws-label" id="wsStatus">未連線</span>
  </div>
</header>

<main class="stage">
  <div class="event-meta">
    <div class="label">活動</div>
    <div class="name" id="eventName">— 請在上方輸入活動 ID 後按連線 —</div>
  </div>

  <div class="ticket">
    <div class="corner-br"></div><div class="corner-bl"></div>
    <div class="ticket-label">候補號碼</div>
    <div class="queue-num idle" id="qNum">—</div>
    <div class="ahead" id="ahead">前方 <strong id="aheadN">0</strong> 人等待</div>
  </div>

  <div class="badge idle" id="badge">
    <div class="dot"></div><span id="badgeText">尚未加入</span>
  </div>

  <button class="btn join" id="actionBtn" onclick="handleAction()">加入候補</button>
</main>

<div class="toasts" id="toasts"></div>

<div class="overlay" id="overlay">
  <div class="overlay-title">恭喜入場</div>
  <div class="overlay-sub">您已被放行，請前往入口</div>
  <button class="btn-dismiss" onclick="document.getElementById('overlay').classList.remove('show')">知道了</button>
</div>

<script>
const S = { userId: null, eventId: null, status: 'NOT_JOINED', stomp: null };

(function init() {
  let uid = localStorage.getItem('qf_uid');
  if (!uid) { uid = 'u_' + Math.random().toString(36).slice(2, 9); localStorage.setItem('qf_uid', uid); }
  S.userId = uid;
  document.getElementById('uidInput').value = uid;
  // 若有上次連線的活動 ID 自動填入
  const lastEv = localStorage.getItem('qf_evid');
  if (lastEv) document.getElementById('evInput').value = lastEv;
})();

// Enter 鍵快速連線
document.getElementById('evInput').addEventListener('keydown', e => { if (e.key === 'Enter') connect(); });
document.getElementById('uidInput').addEventListener('keydown', e => { if (e.key === 'Enter') connect(); });

async function connect() {
  const customUid = document.getElementById('uidInput').value.trim();
  if (customUid) { S.userId = customUid; localStorage.setItem('qf_uid', customUid); }

  const evId = parseInt(document.getElementById('evInput').value);
  if (!evId) { toast('請輸入有效的活動 ID', 'err'); return; }
  S.eventId = evId;
  localStorage.setItem('qf_evid', evId);

  if (S.stomp) { try { S.stomp.deactivate(); } catch(_) {} }
  setWs('連線中…', false);
  initWs();
  await refreshPos();
}

function initWs() {
  const client = new StompJs.Client({
    webSocketFactory: () => new SockJS('/ws'),
    reconnectDelay: 4000,
    onConnect: () => {
      setWs('即時連線', true);
      client.subscribe(`/topic/events/${S.eventId}/queue`, () => { if (S.status === 'WAITING') refreshPos(); });
      client.subscribe(`/topic/users/${S.userId}/queue-status`, m => {
        const d = JSON.parse(m.body);
        if (d.status === 'ADMITTED') { render('ADMITTED', null, null); document.getElementById('overlay').classList.add('show'); }
        else if (d.status === 'EXPIRED') { render('EXPIRED', null, null); toast('您的候補已逾時失效', 'err'); }
      });
    },
    onDisconnect: () => setWs('已斷線', false),
    onStompError: () => setWs('連線錯誤', false),
  });
  client.activate();
  S.stomp = client;
}

function setWs(txt, live) {
  document.getElementById('wsStatus').textContent = txt;
  document.getElementById('wsStatus').className = 'ws-label' + (live ? ' live' : '');
  document.getElementById('wsDot').className = 'ws-dot' + (live ? ' live' : '');
}

async function refreshPos() {
  try {
    const r = await req(`/api/events/${S.eventId}/queue/me?userId=${encodeURIComponent(S.userId)}`);
    if (r.success) render(r.data.status || 'WAITING', r.data.position, r.data.ahead);
    else render('NOT_JOINED', null, null);
  } catch(_) { render('NOT_JOINED', null, null); }
}

async function handleAction() {
  if (!S.eventId) { toast('請先連線到活動', 'err'); return; }
  const btn = document.getElementById('actionBtn');
  btn.disabled = true;
  try {
    if (S.status === 'WAITING') {
      const r = await req(`/api/events/${S.eventId}/queue/me?userId=${encodeURIComponent(S.userId)}`, 'DELETE');
      if (r.success) { render('CANCELLED', null, null); toast('已取消候補'); }
      else toast(r.message || '取消失敗', 'err');
    } else {
      const r = await req(`/api/events/${S.eventId}/queue/join?userId=${encodeURIComponent(S.userId)}`, 'POST');
      if (r.success) { render('WAITING', r.data.position, r.data.ahead); toast(`已加入！您的號碼 ${r.data.position}`, 'ok'); }
      else toast(r.message || '加入失敗', 'err');
    }
  } catch(_) { toast('網路錯誤', 'err'); }
  btn.disabled = false;
}

function render(status, pos, ahead) {
  S.status = status;
  const numEl   = document.getElementById('qNum');
  const aheadEl = document.getElementById('ahead');
  const badge   = document.getElementById('badge');
  const btn     = document.getElementById('actionBtn');
  const glow    = document.getElementById('glowBg');

  const newTxt = pos ? String(pos) : '—';
  if (numEl.textContent !== newTxt) {
    numEl.classList.add('flip');
    setTimeout(() => { numEl.textContent = newTxt; numEl.classList.remove('flip'); }, 120);
  }
  numEl.className = 'queue-num' + (status !== 'WAITING' ? ' idle' : '');
  glow.className  = 'glow-bg' + (status === 'WAITING' ? ' active' : '');
  aheadEl.style.visibility = status === 'WAITING' ? 'visible' : 'hidden';
  document.getElementById('aheadN').textContent = ahead ?? 0;

  const map = {
    WAITING:    { cls: 'waiting',  txt: '等待中' },
    ADMITTED:   { cls: 'admitted', txt: '已放行' },
    EXPIRED:    { cls: 'expired',  txt: '已逾時' },
    CANCELLED:  { cls: 'cancelled',txt: '已取消' },
    NOT_JOINED: { cls: 'idle',     txt: '尚未加入' },
  };
  const s = map[status] || map.NOT_JOINED;
  badge.className = 'badge ' + s.cls;
  document.getElementById('badgeText').textContent = s.txt;

  if (status === 'WAITING')   { btn.textContent = '取消候補'; btn.className = 'btn cancel'; btn.disabled = false; }
  else if (status === 'ADMITTED') { btn.textContent = '已放行'; btn.className = 'btn join'; btn.disabled = true; }
  else { btn.textContent = '加入候補'; btn.className = 'btn join'; btn.disabled = false; }
}

// 連線後自動更新活動名稱（查詢 position 時會取得 eventId 上下文）
async function req(url, method = 'GET', body) {
  const opts = { method, headers: {} };
  if (body !== undefined) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch(url, opts);
  return r.json().catch(() => ({ success: false, message: 'Server error' }));
}

function toast(msg, type = '') {
  const el = document.createElement('div');
  el.className = 'toast ' + type; el.textContent = msg;
  const c = document.getElementById('toasts'); c.appendChild(el);
  setTimeout(() => el.remove(), 3100);
}
</script>
</body>
</html>

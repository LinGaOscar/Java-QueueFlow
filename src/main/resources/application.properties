spring.datasource.url=jdbc:postgresql://localhost:5432/queueflow
spring.datasource.username=queueflow
spring.datasource.password=queueflow
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

spring.data.redis.host=localhost
spring.data.redis.port=6379

# schema.sql 在 JPA 初始化後執行
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

queue.expiry.minutes=30

spring.jackson.serialization.write-dates-as-timestamps=false

# ── Kafka ──
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.queueflow.messaging
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.queueflow.messaging.QueueEventMessage
app.kafka.topic.queue-created=queue-created
app.kafka.topic.queue-admitted=queue-admitted
app.kafka.topic.queue-cancelled=queue-cancelled
app.kafka.topic.queue-expired=queue-expired

# ── Actuator ──
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
